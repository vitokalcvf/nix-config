# Prefixo mais confortavel que o padrao.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal e cores.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:RGB"
set -sg escape-time 0
set -g focus-events on

# Melhor usabilidade.
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on

# Splits e recarregamento mantendo o diretorio atual.
bind r if-shell '[ -f ~/.config/tmux/tmux.conf ]' 'source-file ~/.config/tmux/tmux.conf' 'source-file ~/.tmux.conf' \; display-message "tmux.conf recarregado"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navegacao entre paineis com hjkl.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionamento rapido.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Aparencia alinhada ao Gruvbox do kitty.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g message-style "bg=#458588,fg=#ebdbb2"
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#83a598"
set -g mode-style "bg=#d79921,fg=#282828"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bg=#458588,fg=#ebdbb2,bold] #I:#W #[bg=#282828,fg=#ebdbb2] "

set -g status-left-length 30
set -g status-right-length 60
set -g status-left " #[fg=#98971a,bold]#S "
set -g status-right " #[fg=#928374]%Y-%m-%d #[fg=#ebdbb2]%H:%M "

# Menos ruido visual.
set -g visual-bell off
set -g status-keys vi
setw -g mode-keys vi
